name: Weekly seminar update

on:
  schedule:
    # Every Sunday at 8:00 AM UTC (adjust to your timezone if needed)
    - cron: '0 8 * * 0'
  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape and post
        env:
          WIKI_USER: ${{ secrets.WIKI_USER }}
          WIKI_PASS: ${{ secrets.WIKI_PASS }}
        run: python post_to_wiki.py
